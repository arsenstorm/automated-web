name: Bug report
description: Report something that isn't working as expected.
labels: [bug, triage]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Open the side panel on '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Side panel
        - Background / service worker
        - Content script
        - Notifications
        - Build / tooling
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: Chrome 138
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that helps.
    validations:
      required: false
