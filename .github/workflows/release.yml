name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag matches package.json version
        run: test "v$(jq -r .version package.json)" = "$GITHUB_REF_NAME"

      - name: Build Chrome zip
        run: bun run zip

      - name: Build Firefox zip
        run: bun run zip:firefox

      - name: Checksums
        run: cd .output && sha256sum ./*.zip > checksums.txt

      - name: Sign build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: .output/*.zip

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          .output/*.zip .output/checksums.txt
